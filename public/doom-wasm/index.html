          }
          return true;
        } catch (error) {
          const message = error instanceof Error
            ? error.message
            : `Failed to build runtime HUD patch bundle for ${handle}`;
          clearNativeHudFacePatches();
          reportRuntimeAssetFailure(handle, message);
          return false;
        }
      };

      window.__doomModSetWeaponSpriteManifest = (weaponType, handle) => {
        if (typeof weaponType !== "number" || weaponType < 0 || weaponType > 7) {
          return false;
        }

        const normalizedHandle = typeof handle === "string" ? handle.trim() : "";
        if (!normalizedHandle) {
          clearNativeWeaponPatches(weaponType);
          notifyWeaponSpriteReplacementReady(weaponType, false);
          clearWeaponOverlay();
          return true;
        }

        void installNativeWeaponPatchSet(weaponType, normalizedHandle);
        return true;
      };

      window.__doomModSetEnemySpriteManifest = (enemyType, handle) => {
        if (typeof enemyType !== "number" || enemyType < 0 || enemyType > 9) {
          return false;
        }

        const normalizedHandle = typeof handle === "string" ? handle.trim() : "";
        if (!normalizedHandle) {
          clearNativeEnemyPatch(enemyType);
          clearEnemyReplacement(enemyType);
          return true;
        }

        void installNativeEnemyPatchSet(enemyType, normalizedHandle);
        return true;
      };

      window.__doomModSetHudPatchManifest = (targetType, handle) => {
        if (typeof targetType !== "number" || targetType !== 0) {
          return false;
        }

        const normalizedHandle = typeof handle === "string" ? handle.trim() : "";
        if (!normalizedHandle) {
          clearNativeHudFacePatches();
          return true;
        }

        void installNativeHudPatchSet(targetType, normalizedHandle);
        return true;
      };

      const audioChannels = new Map();
      const generatedSoundBuffers = new Map();
      const generatedSoundLoads = new Map();
      const builtinSfxBuffers = new Map();
      let doomWadLoadPromise = null;
      let doomWadDirectoryPromise = null;
      let doomPalettePromise = null;

      const updateWeaponSoundStatus = (updates) => {
        window.__doomStandaloneState.weaponSound = {
          ...(window.__doomStandaloneState.weaponSound || {}),
          ...updates
        };
      };

      const clearWeaponSoundPack = () => {
        updateWeaponSoundStatus({
          packHandle: "",
          preloadState: "idle",
          lastPlaySource: "none",
          lastPlayedHandle: "",
          source: "",
          lastError: ""
        });
      };

      const primeGeneratedSound = async (handle) => {
        const normalizedHandle = typeof handle === "string" ? handle.trim() : "";
        if (!normalizedHandle) {
          clearWeaponSoundPack();
          return true;
        }

        if (generatedSoundBuffers.has(normalizedHandle)) {
          updateWeaponSoundStatus({
            packHandle: normalizedHandle,
            preloadState: "ready",
            source: getRuntimeAssetUrl(lookupRuntimeAssetRecord(normalizedHandle)),
            lastError: ""
          });
          return true;
        }

        if (generatedSoundLoads.has(normalizedHandle)) {
          return generatedSoundLoads.get(normalizedHandle);
        }

        const record = lookupRuntimeAssetRecord(normalizedHandle);
        const assetUrl = getRuntimeAssetUrl(record);
        if (!record || !assetUrl) {
          updateWeaponSoundStatus({
            packHandle: normalizedHandle,
            preloadState: "error",
            source: "",
            lastError: "No runtime asset record found for generated weapon sound"
          });
          reportRuntimeAssetFailure(
            normalizedHandle,
            "No runtime asset record found for generated weapon sound"
          );
          return false;
        }

        if (typeof record.mediaType === "string" && !record.mediaType.startsWith("audio/")) {
          updateWeaponSoundStatus({
            packHandle: normalizedHandle,
            preloadState: "error",
            source: assetUrl,
            lastError: "Generated weapon sound asset is not audio"
          });
          reportRuntimeAssetFailure(normalizedHandle, "Generated weapon sound asset is not audio");
          return false;
        }

        updateWeaponSoundStatus({
          packHandle: normalizedHandle,
          preloadState: "loading",
          source: assetUrl,
          lastError: ""
        });

        const loadPromise = (async () => {
          try {
            await unlockBrowserAudio();
            const response = await fetch(assetUrl);
            if (!response.ok) {
              throw new Error(`Failed to fetch generated weapon sound (${response.status})`);
            }
            const audioBuffer = await response.arrayBuffer();
            const decoded = await decodeAudioBuffer(audioBuffer);
            generatedSoundBuffers.set(normalizedHandle, decoded);
            updateWeaponSoundStatus({
              packHandle: normalizedHandle,
              preloadState: "ready",
              source: assetUrl,
              lastError: ""
            });
            return true;
          } catch (error) {
            const message =
              error instanceof Error ? error.message : "Failed to decode generated weapon sound";
            updateWeaponSoundStatus({
              packHandle: normalizedHandle,
              preloadState: "error",
              source: assetUrl,
              lastError: message
            });
            reportRuntimeAssetFailure(normalizedHandle, message);
            return false;
          } finally {
            generatedSoundLoads.delete(normalizedHandle);
          }
        })();

        generatedSoundLoads.set(normalizedHandle, loadPromise);
        return loadPromise;
      };

      const loadDoomWadBytes = async () => {
        if (!doomWadLoadPromise) {
          doomWadLoadPromise = fetch("doom1.wad").then(async (response) => {
            if (!response.ok) {
              throw new Error(`Failed to fetch doom1.wad (${response.status})`);
            }
            return response.arrayBuffer();
          });
        }
        return doomWadLoadPromise;
      };

      const getDoomPalette = async () => {
        if (!doomPalettePromise) {
          doomPalettePromise = getDoomWadDirectory().then(({ buffer, directory }) => {
            const entry = directory.get("PLAYPAL");
            if (!entry || entry.size < 768) {
              throw new Error("PLAYPAL was not found in doom1.wad");
            }

            const view = new Uint8Array(buffer, entry.filePos, 768);
            const palette = [];
            for (let index = 0; index < 256; index += 1) {
              palette.push([view[index * 3], view[index * 3 + 1], view[index * 3 + 2]]);
            }
            return palette;
          });
        }

        return doomPalettePromise;
      };

      const getDoomWadDirectory = async () => {
        if (!doomWadDirectoryPromise) {
          doomWadDirectoryPromise = loadDoomWadBytes().then((buffer) => {
            const view = new DataView(buffer);
            const wadType = String.fromCharCode(
              view.getUint8(0),
              view.getUint8(1),
              view.getUint8(2),
              view.getUint8(3)
            );
            if (wadType !== "IWAD" && wadType !== "PWAD") {
              throw new Error(`Unexpected WAD header ${wadType}`);
            }

            const lumpCount = view.getInt32(4, true);
            const directoryOffset = view.getInt32(8, true);
            const directory = new Map();

            for (let index = 0; index < lumpCount; index += 1) {
              const entryOffset = directoryOffset + index * 16;
              const filePos = view.getInt32(entryOffset, true);
              const size = view.getInt32(entryOffset + 4, true);
              let name = "";
              for (let i = 0; i < 8; i += 1) {
                const charCode = view.getUint8(entryOffset + 8 + i);
                if (charCode === 0) {
                  break;
                }
                name += String.fromCharCode(charCode);
              }
              directory.set(name.toUpperCase(), { filePos, size });
            }

            return { buffer, directory };
          });
        }

        return doomWadDirectoryPromise;
      };

      const decodeBuiltinSfx = async (name) => {
        const key = String(name || "").trim().toUpperCase();
        if (!key) {
          return null;
        }
        if (builtinSfxBuffers.has(key)) {
          return builtinSfxBuffers.get(key);
        }

        const { buffer, directory } = await getDoomWadDirectory();
        const lumpName = `DS${key}`.slice(0, 8);
        const entry = directory.get(lumpName);
        if (!entry) {
          throw new Error(`Sound lump ${lumpName} was not found in doom1.wad`);
        }

        const view = new DataView(buffer, entry.filePos, entry.size);
        if (entry.size < 24 || view.getUint8(0) !== 0x03 || view.getUint8(1) !== 0x00) {
          throw new Error(`Sound lump ${lumpName} is not a valid Doom DMX sound`);
        }

        const sampleRate = view.getUint16(2, true);
        const declaredLength = view.getUint32(4, true);
        const sampleOffset = 24;
        const sampleLength = declaredLength - 32;

        if (declaredLength <= 48 || sampleOffset + sampleLength > entry.size) {
          throw new Error(`Sound lump ${lumpName} has invalid sample bounds`);
        }

        const audioContextCtor = window.AudioContext || window.webkitAudioContext;
        if (!audioContextCtor) {
          throw new Error("Browser AudioContext is unavailable");
        }
        if (!browserAudioState.context) {
          browserAudioState.context = new audioContextCtor();
        }

        const audioBuffer = browserAudioState.context.createBuffer(1, sampleLength, sampleRate);
        const channel = audioBuffer.getChannelData(0);
        for (let i = 0; i < sampleLength; i += 1) {
          const value = view.getUint8(sampleOffset + i);
          channel[i] = (value - 128) / 128;
        }

        builtinSfxBuffers.set(key, audioBuffer);
        return audioBuffer;
      };

      const playBuiltinSfx = async (name, volume = 127, sep = 128) => {
        await unlockBrowserAudio();
        const audioContextCtor = window.AudioContext || window.webkitAudioContext;
        if (!audioContextCtor) {
          throw new Error("Browser AudioContext is unavailable");
        }
        if (!browserAudioState.context) {
          browserAudioState.context = new audioContextCtor();
        }

        const buffer = await decodeBuiltinSfx(name);
        if (!buffer) {
          return false;
        }

        const source = browserAudioState.context.createBufferSource();
        source.buffer = buffer;

        const gainNode = browserAudioState.context.createGain();
        gainNode.gain.value = Math.max(0, Math.min(1, Number(volume) / 127));

        let finalNode = gainNode;
        if (typeof browserAudioState.context.createStereoPanner === "function") {
          const panner = browserAudioState.context.createStereoPanner();
          panner.pan.value = Math.max(-1, Math.min(1, (Number(sep) - 127) / 127));
          gainNode.connect(panner);
          panner.connect(browserAudioState.context.destination);
          finalNode = panner;
        } else {
          gainNode.connect(browserAudioState.context.destination);
        }

        source.connect(gainNode);
        source.start(0);
        updateWeaponSoundStatus({
          lastPlaySource: "stock",
          lastPlayedHandle: String(name || ""),
          lastError: ""
        });
        source.addEventListener(
          "ended",
          () => {
            source.disconnect();
            gainNode.disconnect();
            if (finalNode !== gainNode) {
              finalNode.disconnect();
            }
          },
          { once: true }
        );

        return true;
      };

      window.__doomModSetWeaponSoundPack = (weaponType, handle) => {
        if (typeof weaponType !== "number" || weaponType < 0 || weaponType > 7) {
          return false;
        }

        const normalizedHandle = typeof handle === "string" ? handle.trim() : "";
        if (!normalizedHandle) {
          clearWeaponSoundPack();
          return true;
        }

        updateWeaponSoundStatus({
          packHandle: normalizedHandle,
          preloadState: "loading",
          source: getRuntimeAssetUrl(lookupRuntimeAssetRecord(normalizedHandle)),
          lastError: ""
        });
        void primeGeneratedSound(normalizedHandle);
        return true;
      };

      window.__doomModPlayBuiltinSfx = (name, volume, sep) => {
        if (typeof name !== "string" || name.trim().length === 0) {
          return false;
        }
        void playBuiltinSfx(name, volume, sep).catch((error) => {
          recordAssetRuntimeError(
            `Built-in SFX playback failed for ${name}: ${error instanceof Error ? error.message : String(error)}`
          );
        });
        return true;
      };

      window.__doomModPlayAssetSound = (handle) => {
        const record = lookupRuntimeAssetRecord(handle);
        const assetUrl = getRuntimeAssetUrl(record);
        if (!record || !assetUrl) {
          reportRuntimeAssetFailure(handle, "No runtime asset record found for generated sound");
          return false;
        }

        if (!generatedSoundBuffers.has(handle)) {
          const loadState = window.__doomStandaloneState.weaponSound?.preloadState;
          if (loadState !== "loading") {
            void primeGeneratedSound(handle);
          }
          return false;
        }

        try {
          const buffer = generatedSoundBuffers.get(handle);
          const audioContextCtor = window.AudioContext || window.webkitAudioContext;
          if (!audioContextCtor) {
            throw new Error("Browser AudioContext is unavailable");
          }
          if (!browserAudioState.context) {
            browserAudioState.context = new audioContextCtor();
          }
          const source = browserAudioState.context.createBufferSource();
          const gainNode = browserAudioState.context.createGain();
          source.buffer = buffer;
          gainNode.gain.value = 0.9;
          source.connect(gainNode);
          gainNode.connect(browserAudioState.context.destination);
          source.start(0);
          audioChannels.set(handle, source);
          updateWeaponSoundStatus({
            lastPlaySource: "generated",
            lastPlayedHandle: handle,
            source: assetUrl,
            lastError: ""
          });
          source.addEventListener(
            "ended",
            () => {
              audioChannels.delete(handle);
              source.disconnect();
              gainNode.disconnect();
            },
            { once: true }
          );
          return true;
        } catch (error) {
          const message =
            error instanceof Error
              ? error.message
              : `Browser rejected generated asset playback for handle ${handle}`;
          updateWeaponSoundStatus({
            lastError: message
          });
          reportRuntimeAssetFailure(handle, message);
          return false;
        }
      };

      registerAudioUnlock();

      var Module = {
        noInitialRun: true,
        preRun: () => {
          Module.FS.createPreloadedFile("", "doom1.wad", "/doom/doom1.wad", true, true);
          Module.FS.createPreloadedFile("", "default.cfg", "/doom-wasm/default.cfg", true, true);
        },
        onRuntimeInitialized: () => {
          console.info("[doom-shell] onRuntimeInitialized hook entered");
          window.__doomStandaloneState.runtimeInitialized = true;
          if (window.__doomStandaloneState.bootRequested) {
            startDoomMain();
          } else {
            setStatus("Runtime ready", true);
          }
        },
        postRun: () => {
          console.info("[doom-shell] postRun hook entered");
        },
        print: (...args) => console.log("[doom-shell]", ...args),
        printErr: (...args) => {
          const message = args.map(String).join(" ");
          if (
            !window.__doomStandaloneState.bootError &&
            /recursive call to I_Error|program exited|Aborted|memory access out of bounds|alignment fault|Bad music number|emscripten_force_exit cannot actually shut down/i.test(
              message
            )
          ) {
            recordBootError(message);
          }
          console.error("[doom-shell]", ...args);
        },
        setStatus,
        canvas: canvasElement,
        monitorRunDependencies: (left) => {
          if (left > 0) {
            setStatus(`Preparing ${left}`);
          }
        }
      };

      window.addEventListener("error", (event) => {
        const message = event.error instanceof Error ? event.error.message : String(event.message);
        recordBootError(message);
        setStatus("Boot error");
        console.error("[doom-shell] window error", event.error ?? event.message);
      });
      window.addEventListener("unhandledrejection", (event) => {
        const reason = event.reason instanceof Error ? event.reason.message : String(event.reason);
        recordBootError(reason);
        setStatus("Runtime error", true);
        console.error("[doom-shell] unhandled rejection", event.reason);
      });
    </script>
    <script
      src="websockets-doom.js"
      onload="window.__doomStandaloneState.scriptLoaded = true; setStatus('WASM loader ready');"
      onerror="window.__doomStandaloneState.bootError = 'Failed to load websockets-doom.js'; setStatus('Loader failed');"
    ></script>
  </body>
</html>
